services:
  clipcast:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8906:8906"
    volumes:
      - ./data:/data
      - ./podcasts:/podcasts
    environment:
      - REDIS_URL=redis://127.0.0.1:6379/0
      - DATABASE_PATH=/data/clipcast.db
      - PODCASTS_DIR=/podcasts
      - FRONTEND_DIR=static/frontend
      # Optional: enables the in-app "Submit a ticket" footer link (files issues to Linear)
      - LINEAR_API_KEY=${LINEAR_API_KEY:-}
      - LINEAR_TEAM_ID=${LINEAR_TEAM_ID:-}
      - LINEAR_PROJECT_ID=${LINEAR_PROJECT_ID:-}
    restart: unless-stopped

  transcription:
    image: ghcr.io/ggml-org/whisper.cpp:main
    platform: linux/amd64
    entrypoint: []
    command: >
      ./build/bin/whisper-server
      --host 0.0.0.0 --port 8998
      --model /models/ggml-base.en.bin
      --no-gpu --convert --threads 4
    volumes:
      - ./transcription/models:/models
    deploy:
      resources:
        limits:
          cpus: "4"
    restart: unless-stopped
