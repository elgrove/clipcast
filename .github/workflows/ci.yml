name: CI

on:
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Run Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Run tests
        run: uv run pytest
